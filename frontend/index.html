<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASJ - User CRUD</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background: #f5f5f5;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            color: #333;
        }
        .form-section {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="text"],
        input[type="email"] {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        input[type="file"] {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            width: 100%;
        }
        button {
            background: #007bff;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 10px;
        }
        button:hover {
            background: #0056b3;
        }
        .btn-cancel {
            background: #6c757d;
        }
        .btn-cancel:hover {
            background: #545b62;
        }
        .btn-delete {
            background: #dc3545;
        }
        .btn-delete:hover {
            background: #c82333;
        }
        .users-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        .user-card {
            background: white;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .user-photo {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 4px;
            margin-bottom: 10px;
        }
        .user-info {
            margin-bottom: 10px;
        }
        .user-name {
            font-size: 18px;
            font-weight: bold;
        }
        .user-email {
            color: #666;
            margin-bottom: 10px;
        }
        .user-actions {
            display: flex;
            gap: 10px;
        }
        .user-actions button {
            flex: 1;
            padding: 5px;
            font-size: 14px;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: white;
            padding: 20px;
            border-radius: 8px;
            max-width: 400px;
            width: 90%;
        }
        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            justify-content: flex-end;
        }
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px;
            border-radius: 4px;
            color: white;
            display: none;
        }
        .notification.success { background: #28a745; }
        .notification.error { background: #dc3545; }
        .photo-preview {
            margin-top: 10px;
            max-width: 200px;
        }
        .photo-preview img {
            width: 100%;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📋 User Management</h1>
        
        <!-- Form Section -->
        <div class="form-section">
            <h2 id="formTitle">➕ Add New User</h2>
            <form id="userForm">
                <input type="hidden" id="userId">
                
                <div class="form-group">
                    <label for="name">Name of Owner File:</label>
                    <input type="text" id="name" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" required>
                </div>
                
                <div class="form-group">
                    <label for="photo">Photo Profile:</label>
                    <input type="file" id="photo" accept="image/*">
                    <small>Max 5MB</small>
                </div>
                
                <div id="photoPreview" class="photo-preview" style="display: none;">
                    <img id="previewImg" src="" alt="Preview">
                </div>
                
                <div>
                    <button type="submit" id="submitBtn">Save</button>
                    <button type="button" class="btn-cancel" onclick="cancelForm()">Cancel</button>
                </div>
            </form>
        </div>
        
        <!-- Users List -->
        <h2>📋 Users List</h2>
        <div id="usersList" class="users-grid">
            <div class="loading">Loading users...</div>
        </div>
    </div>
    
    <!-- Delete Confirmation Modal -->
    <div id="deleteModal" class="modal">
        <div class="modal-content">
            <h3>Confirm Delete</h3>
            <p>Are you sure you want to delete this user?</p>
            <div class="modal-actions">
                <button class="btn-delete" onclick="confirmDelete()">Delete</button>
                <button class="btn-cancel" onclick="closeModal()">Cancel</button>
            </div>
        </div>
    </div>
    
    <!-- Notification -->
    <div id="notification" class="notification"></div>
    
    <script>
        const API_URL = 'http://13.13.13.13:8080/api/users';
        let deleteId = null;
        
        // Load users on page load
        document.addEventListener('DOMContentLoaded', loadUsers);
        
        // Form submit
        document.getElementById('userForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData();
            formData.append('name', document.getElementById('name').value);
            formData.append('email', document.getElementById('email').value);
            
            const photo = document.getElementById('photo').files[0];
            if (photo) {
                if (photo.size > 5 * 1024 * 1024) {
                    showNotification('File too large (max 5MB)', 'error');
                    return;
                }
                if (!photo.type.startsWith('image/')) {
                    showNotification('Only image files allowed', 'error');
                    return;
                }
                formData.append('photo', photo);
            }
            
            const userId = document.getElementById('userId').value;
            const url = userId ? `${API_URL}/${userId}` : `${API_URL}/`;
            const method = userId ? 'PUT' : 'POST';
            
            try {
                const response = await fetch(url, { method, body: formData });
                if (response.ok) {
                    showNotification(userId ? 'User updated!' : 'User created!', 'success');
                    cancelForm();
                    loadUsers();
                } else {
                    const error = await response.json();
                    showNotification(error.detail || 'Error', 'error');
                }
            } catch (error) {
                showNotification('Connection error', 'error');
            }
        });
        
        // Load users
        async function loadUsers() {
            const list = document.getElementById('usersList');
            try {
                const response = await fetch(`${API_URL}/`);
                const data = await response.json();
                
                if (data.users && data.users.length > 0) {
                    list.innerHTML = data.users.map(user => `
                        <div class="user-card">
                            <img class="user-photo" src="${user.photo_url || 'https://via.placeholder.com/300x200?text=No+Photo'}" 
                                 onerror="this.src='https://via.placeholder.com/300x200?text=No+Photo'">
                            <div class="user-info">
                                <div class="user-name">${escapeHtml(user.name)}</div>
                                <div class="user-email">${escapeHtml(user.email)}</div>
                                <small>ID: ${user.id.substring(0,8)}...</small>
                            </div>
                            <div class="user-actions">
                                <button onclick="editUser('${user.id}')">Edit</button>
                                <button class="btn-delete" onclick="showDeleteModal('${user.id}')">Delete</button>
                            </div>
                        </div>
                    `).join('');
                } else {
                    list.innerHTML = '<div class="loading">No users found</div>';
                }
            } catch (error) {
                list.innerHTML = '<div class="loading">Error loading users</div>';
            }
        }
        
        // Edit user
        async function editUser(id) {
            try {
                const response = await fetch(`${API_URL}/${id}`);
                const user = await response.json();
                
                document.getElementById('userId').value = user.id;
                document.getElementById('name').value = user.name;
                document.getElementById('email').value = user.email;
                document.getElementById('formTitle').textContent = '✏️ Edit User';
                document.getElementById('submitBtn').textContent = 'Update';
                
                if (user.photo_url) {
                    document.getElementById('previewImg').src = user.photo_url;
                    document.getElementById('photoPreview').style.display = 'block';
                }
                
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } catch (error) {
                showNotification('Error loading user', 'error');
            }
        }
        
        // Cancel form
        function cancelForm() {
            document.getElementById('userForm').reset();
            document.getElementById('userId').value = '';
            document.getElementById('formTitle').textContent = '➕ Add New User';
            document.getElementById('submitBtn').textContent = 'Save';
            document.getElementById('photoPreview').style.display = 'none';
        }
        
        // Photo preview
        document.getElementById('photo').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('previewImg').src = e.target.result;
                    document.getElementById('photoPreview').style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });
        
        // Delete modal
        function showDeleteModal(id) {
            deleteId = id;
            document.getElementById('deleteModal').style.display = 'flex';
        }
        
        function closeModal() {
            document.getElementById('deleteModal').style.display = 'none';
            deleteId = null;
        }
        
        async function confirmDelete() {
            if (!deleteId) return;
            
            try {
                const response = await fetch(`${API_URL}/${deleteId}`, { method: 'DELETE' });
                if (response.ok) {
                    showNotification('User deleted!', 'success');
                    loadUsers();
                } else {
                    showNotification('Error deleting user', 'error');
                }
            } catch (error) {
                showNotification('Connection error', 'error');
            }
            closeModal();
        }
        
        // Notification
        function showNotification(message, type) {
            const notif = document.getElementById('notification');
            notif.textContent = message;
            notif.className = `notification ${type}`;
            notif.style.display = 'block';
            
            setTimeout(() => {
                notif.style.display = 'none';
            }, 3000);
        }
        
        // Escape HTML
        function escapeHtml(unsafe) {
            return unsafe
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }
    </script>
</body>
</html>
